<svg xmlns="http://www.w3.org/2000/svg" width="48" height="60" viewBox="0 0 48 60">
  <!-- 森林酷跑玩家角色 - 可爱小狐狸跑者 -->
  <!-- 身体 -->
  <rect x="8" y="22" width="32" height="30" rx="8" fill="#2d6a4f"/>
  <!-- 肚子 -->
  <rect x="14" y="28" width="20" height="18" rx="5" fill="#74c69d"/>
  <!-- 头部 -->
  <circle cx="24" cy="16" r="14" fill="#2d6a4f"/>
  <!-- 脸部 -->
  <circle cx="24" cy="18" r="10" fill="#40916c"/>
  <!-- 左耳 -->
  <polygon points="12,6 8,18 16,16" fill="#2d6a4f"/>
  <polygon points="13,9 10,16 16,15" fill="#40916c"/>
  <!-- 右耳 -->
  <polygon points="36,6 40,18 32,16" fill="#2d6a4f"/>
  <polygon points="35,9 38,16 32,15" fill="#40916c"/>
  <!-- 左眼白 -->
  <ellipse cx="19" cy="15" rx="4" ry="4.5" fill="white"/>
  <!-- 右眼白 -->
  <ellipse cx="29" cy="15" rx="4" ry="4.5" fill="white"/>
  <!-- 左瞳孔 -->
  <circle cx="20" cy="15" r="2.5" fill="#1a1a2e"/>
  <circle cx="21" cy="14" r="1" fill="white"/>
  <!-- 右瞳孔 -->
  <circle cx="30" cy="15" r="2.5" fill="#1a1a2e"/>
  <circle cx="31" cy="14" r="1" fill="white"/>
  <!-- 鼻子 -->
  <ellipse cx="24" cy="20" rx="2.5" ry="2" fill="#1b3a2d"/>
  <!-- 嘴巴微笑 -->
  <path d="M21,22 Q24,25 27,22" stroke="#1b3a2d" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- 帽子 -->
  <rect x="10" y="4" width="28" height="8" rx="3" fill="#f4a261"/>
  <rect x="6" y="10" width="36" height="4" rx="2" fill="#e76f51"/>
  <!-- 帽子装饰 -->
  <circle cx="24" cy="8" r="3" fill="#e9c46a"/>
  <!-- 左腿 -->
  <rect x="12" y="48" width="8" height="10" rx="3" fill="#2d6a4f"/>
  <ellipse cx="16" cy="58" rx="5" ry="3" fill="#1b3a2d"/>
  <!-- 右腿 -->
  <rect x="28" y="48" width="8" height="10" rx="3" fill="#2d6a4f"/>
  <ellipse cx="32" cy="58" rx="5" ry="3" fill="#1b3a2d"/>
  <!-- 左臂 -->
  <rect x="2" y="26" width="8" height="6" rx="3" fill="#40916c"/>
  <!-- 右臂 -->
  <rect x="38" y="26" width="8" height="6" rx="3" fill="#40916c"/>
</svg>