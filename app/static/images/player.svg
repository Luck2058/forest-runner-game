<svg xmlns="http://www.w3.org/2000/svg" width="48" height="64" viewBox="0 0 48 64">
  <!-- 森林酷跑玩家角色 - 疯狂动物城尼克风格狐狸跑者 -->
  <!-- 蓬松大尾巴 -->
  <ellipse cx="10" cy="36" rx="10" ry="14" fill="#D85A30"/>
  <ellipse cx="10" cy="36" rx="7" ry="11" fill="#E8906A"/>
  <ellipse cx="10" cy="36" rx="4" ry="7" fill="#FAECE7"/>
  <!-- 身体 -->
  <rect x="16" y="24" width="20" height="26" rx="8" fill="#D85A30"/>
  <!-- 肚子 -->
  <rect x="20" y="28" width="14" height="18" rx="5" fill="#FAECE7"/>
  <!-- 绿色小背心 -->
  <path d="M18,28 Q16,26 18,24 L32,24 Q34,26 32,28 L32,40 Q26,42 18,40 Z" fill="#2d6a4f" opacity="0.85"/>
  <path d="M22,28 L22,38 Q26,40 30,38 L30,28 Q26,30 22,28 Z" fill="#40916c" opacity="0.7"/>
  <!-- 头部 -->
  <ellipse cx="28" cy="14" rx="14" ry="13" fill="#D85A30"/>
  <!-- 脸部浅色 -->
  <ellipse cx="28" cy="16" rx="10" ry="9" fill="#FAECE7"/>
  <!-- 左耳 -->
  <polygon points="18,2 14,14 22,12" fill="#D85A30"/>
  <polygon points="19,5 16,12 22,11" fill="#8B4513"/>
  <polygon points="19,7 17,11 21,10.5" fill="#FAECE7"/>
  <!-- 右耳 -->
  <polygon points="38,2 42,14 34,12" fill="#D85A30"/>
  <polygon points="37,5 40,12 34,11" fill="#8B4513"/>
  <polygon points="37,7 39,11 35,10.5" fill="#FAECE7"/>
  <!-- 左眼白 -->
  <ellipse cx="23" cy="13" rx="4.5" ry="5" fill="white"/>
  <!-- 右眼白 -->
  <ellipse cx="33" cy="13" rx="4.5" ry="5" fill="white"/>
  <!-- 左绿色虹膜 -->
  <ellipse cx="24" cy="13" rx="3" ry="3.5" fill="#1D9E75"/>
  <!-- 左瞳孔 -->
  <ellipse cx="24.5" cy="13" rx="2" ry="2.5" fill="#1a1a2e"/>
  <!-- 左眼高光（双层） -->
  <circle cx="25.5" cy="11.5" r="1.2" fill="white"/>
  <circle cx="23" cy="14.5" r="0.6" fill="white"/>
  <!-- 右绿色虹膜 -->
  <ellipse cx="34" cy="13" rx="3" ry="3.5" fill="#1D9E75"/>
  <!-- 右瞳孔 -->
  <ellipse cx="34.5" cy="13" rx="2" ry="2.5" fill="#1a1a2e"/>
  <!-- 右眼高光（双层） -->
  <circle cx="35.5" cy="11.5" r="1.2" fill="white"/>
  <circle cx="33" cy="14.5" r="0.6" fill="white"/>
  <!-- 鼻子 -->
  <ellipse cx="28" cy="18" rx="3" ry="2" fill="#1a1a2e"/>
  <ellipse cx="28" cy="17.5" rx="1.5" ry="0.8" fill="#444" opacity="0.5"/>
  <!-- 嘴巴微笑 -->
  <path d="M24,20 Q28,24 32,20" stroke="#8B4513" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- 左腮红 -->
  <ellipse cx="20" cy="17" rx="3" ry="2" fill="#FF9999" opacity="0.5"/>
  <!-- 右腮红 -->
  <ellipse cx="36" cy="17" rx="3" ry="2" fill="#FF9999" opacity="0.5"/>
  <!-- 左腿 -->
  <rect x="20" y="48" width="7" height="10" rx="3" fill="#D85A30"/>
  <ellipse cx="23" cy="58" rx="5" ry="3" fill="#8B4513"/>
  <!-- 右腿 -->
  <rect x="29" y="48" width="7" height="10" rx="3" fill="#D85A30"/>
  <ellipse cx="32" cy="58" rx="5" ry="3" fill="#8B4513"/>
  <!-- 左臂 -->
  <rect x="14" y="28" width="5" height="8" rx="2.5" fill="#D85A30"/>
  <!-- 右臂 -->
  <rect x="33" y="28" width="5" height="8" rx="2.5" fill="#D85A30"/>
</svg>
