<svg xmlns="http://www.w3.org/2000/svg" width="40" height="36" viewBox="0 0 40 36">
  <!-- 森林酷跑 - 绿色啄木鸟（空中障碍物） -->
  <!-- 身体 -->
  <ellipse cx="20" cy="20" rx="10" ry="12" fill="#2d6a4f"/>
  <!-- 肚子 -->
  <ellipse cx="20" cy="22" rx="7" ry="9" fill="#FAECE7"/>
  <!-- 头部 -->
  <circle cx="20" cy="10" r="8" fill="#2d6a4f"/>
  <!-- 红色头冠 -->
  <path d="M16,4 Q20,-2 24,4 L22,8 Q20,6 18,8 Z" fill="#e76f51"/>
  <path d="M17,5 Q20,0 23,5 L21,7 Q20,5.5 19,7 Z" fill="#f4a261"/>
  <!-- 眼白 -->
  <circle cx="17" cy="9" r="3.5" fill="white"/>
  <!-- 瞳孔 -->
  <circle cx="17.5" cy="9" r="2" fill="#1a1a2e"/>
  <circle cx="18" cy="8" r="0.8" fill="white"/>
  <!-- 尖嘴 -->
  <polygon points="12,10 4,9 12,8" fill="#f4a261"/>
  <line x1="4" y1="9" x2="6" y2="9" stroke="#8B4513" stroke-width="0.8"/>
  <!-- 左翅膀 -->
  <path d="M10,16 L0,12 L2,20 L10,22 Z" fill="#40916c"/>
  <path d="M10,18 L3,15 L4,20 L10,21 Z" fill="#52b788"/>
  <!-- 右翅膀 -->
  <path d="M30,16 L40,12 L38,20 L30,22 Z" fill="#40916c"/>
  <path d="M30,18 L37,15 L36,20 L30,21 Z" fill="#52b788"/>
  <!-- 尾巴 -->
  <path d="M20,30 L17,36 L20,34 L23,36 Z" fill="#2d6a4f"/>
  <path d="M20,30 L18,34 L20,32.5 L22,34 Z" fill="#40916c"/>
  <!-- 小爪子 -->
  <path d="M17,28 L15,32 M17,28 L17,32 M17,28 L19,32" stroke="#8B4513" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M23,28 L21,32 M23,28 L23,32 M23,28 L25,32" stroke="#8B4513" stroke-width="1.2" stroke-linecap="round"/>
</svg>
