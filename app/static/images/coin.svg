<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36">
  <!-- 森林酷跑 - 闪亮金币(G版) -->
  <!-- 外圈光晕 -->
  <circle cx="18" cy="18" r="16" fill="rgba(255,215,0,0.25)"/>
  <!-- 金币外圈 -->
  <circle cx="18" cy="18" r="14" fill="#F4A261" stroke="#e9c46a" stroke-width="2"/>
  <!-- 金币内圈 -->
  <circle cx="18" cy="18" r="10" fill="#FFE066" stroke="#e9c46a" stroke-width="1.5"/>
  <!-- G 字母 -->
  <text x="18" y="23" text-anchor="middle" font-size="14" font-weight="bold" fill="#9B5523" font-family="Arial,sans-serif">G</text>
  <!-- 星形装饰 - 左上 -->
  <polygon points="6,8 7,6 8,8 6,7 8,7" fill="#FFE066" opacity="0.8"/>
  <!-- 星形装饰 - 右上 -->
  <polygon points="28,6 29,4 30,6 28,5 30,5" fill="#FFE066" opacity="0.7"/>
  <!-- 星形装饰 - 右下 -->
  <polygon points="30,28 31,26 32,28 30,27 32,27" fill="#FFE066" opacity="0.6"/>
  <!-- 主高光 -->
  <ellipse cx="13" cy="12" rx="5" ry="3.5" fill="rgba(255,255,255,0.5)"/>
  <!-- 小高光点 -->
  <circle cx="24" cy="11" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="10" cy="22" r="1" fill="white" opacity="0.4"/>
</svg>
