<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36">
  <!-- 金币 -->
  <!-- 外圈光晕 -->
  <circle cx="18" cy="18" r="16" fill="rgba(255,215,0,0.3)"/>
  <!-- 金币外圈 -->
  <circle cx="18" cy="18" r="14" fill="#F4A261" stroke="#e9c46a" stroke-width="2"/>
  <!-- 金币内圈 -->
  <circle cx="18" cy="18" r="10" fill="#FFE066" stroke="#e9c46a" stroke-width="1"/>
  <!-- 金币符号 -->
  <text x="18" y="23" text-anchor="middle" font-size="14" font-weight="bold" fill="#9B5523" font-family="serif">$</text>
  <!-- 高光 -->
  <ellipse cx="14" cy="12" rx="4" ry="3" fill="rgba(255,255,255,0.5)"/>
</svg>